name: CI Contract Regression Gate

on:
  push:
    branches: [main, develop]
    paths:
      - 'shared/**'
      - 'edge/**'        # a real QNNBackend that breaks the ABC must fail here
      - 'cloud/**'       # likewise NIMBackend
      - 'router/**'
      - 'fabric/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'shared/**'
      - 'edge/**'
      - 'cloud/**'
      - 'router/**'
      - 'fabric/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-gate:
    name: Verify Integration Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify package layout
        run: |
          for pkg in shared fabric; do
            if [ -d "$pkg" ] && [ ! -f "$pkg/__init__.py" ]; then
              echo "::warning::Creating $pkg/__init__.py for isolation testing"
              touch "$pkg/__init__.py"
            fi
          done

      - name: Gate 1 — contract smoke test (swap / offline / metrics)
        run: python -c "import asyncio; from shared.harp_contract import _smoke; asyncio.run(_smoke())"

      - name: Gate 2 — backend conformance (real backends must satisfy the ABC)
        run: python -m shared.conformance

      - name: Gate 3 — fabric four-state offline queue
        if: ${{ hashFiles('fabric/sync_queue.py') != '' }}
        run: python -m fabric.sync_queue

      - name: Contract break diagnostics
        if: failure()
        run: |
          echo "::error::Integration spine broken. Changes to the Backend ABC,"
          echo "::error::shared enums, PlanGraph DAG ordering, or the SyncState FSM"
          echo "::error::require explicit CTO sign-off before merge."
