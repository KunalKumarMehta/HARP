# HARP CI Pipeline — gates the 9 contract invariants from SDD §9
# Runs on every push/PR. All jobs must pass for merge.

name: HARP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  # Gate 1: Contract smoke test (shared.harp_contract._smoke)
  # Covers: FR1/FR2 backend swap, offline fail-closed, metrics
  contract-smoke:
    name: "Gate 1: Contract Smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q jsonschema websockets httpx
      - name: Run contract smoke
        run: python -c "import asyncio; from shared.harp_contract import _smoke; asyncio.run(_smoke())"

  # Gate 2: ABC conformance (shared.conformance)
  # Covers: FR1 Backend ABC conformance (mocks + any real backend)
  conformance:
    name: "Gate 2: ABC Conformance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run conformance
        run: python -m shared.conformance

  # Gate 3: Four-state sync queue FSM (fabric.sync_queue)
  # Covers: FR8 four-state FSM, crash recovery, conflict quarantine
  sync-queue:
    name: "Gate 3: Sync Queue FSM"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run sync queue test
        run: python -m fabric.sync_queue

  # Gate 4: E2E routing smoke (tests.e2e_smoke)
  # Covers: FR2 AUTO calibration + pins + fail-closed
  e2e-smoke:
    name: "Gate 4: E2E Routing Smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run e2e smoke
        run: python tests/e2e_smoke.py

  # Gate 5: WS roundtrip (tests.ws_roundtrip)
  # Covers: FR8 drop→reconnect→idempotent redelivery
  ws-roundtrip:
    name: "Gate 5: WS Roundtrip"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install websockets
        run: pip install -q websockets
      - name: Run WS roundtrip
        run: python tests/ws_roundtrip.py

  # Gate 6: Plan codec (shared.plan_codec)
  # Covers: FR3 schema + DAG validation, round-trip, 6 rejections
  plan-codec:
    name: "Gate 6: Plan Codec"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install jsonschema
        run: pip install -q jsonschema
      - name: Run plan codec
        run: python -m shared.plan_codec

  # Gate 7: Executor smoke (tests.executor_smoke)
  # Covers: FR4 dataflow threading, failure-skip, boundary-safety, cycle reject
  executor-smoke:
    name: "Gate 7: Executor Smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run executor smoke
        run: python tests/executor_smoke.py

  # Gate 8: Genie backend conformance (edge.genie_backend)
  # Covers: FR5 Genie conformance + swarm discovery (off-device stub)
  genie-backend:
    name: "Gate 8: Genie Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run genie backend
        run: python -m edge.genie_backend

  # Gate 9: Remote backend / multi-device (fabric.remote_backend)
  # Covers: FR7 multi-device over real socket + truncation-raises
  remote-backend:
    name: "Gate 9: Remote Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install websockets
        run: pip install -q websockets
      - name: Run remote backend
        run: python -m fabric.remote_backend

  # Gate 10: OpenAI-compatible serve endpoint (serve.openai_endpoint)
  # Covers: single-flight NPU lock, overflow-shed, tool_calls schema, tools->no-CoT
  serve-endpoint:
    name: "Gate 10: Serve Endpoint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q fastapi httpx
      - name: Endpoint contract (schema + stream + tool_calls)
        run: python tests/test_endpoint_contract.py
      - name: NPU single-flight + overflow shed
        run: python tests/test_npu_single_flight.py
      - name: Tools force thinking off on local lane
        run: python tests/test_tools_thinking_off.py

  # Gate 11: Router contention axis (router.router_policy)
  # Covers: contention_shed when NPU busy, never-shed offline (stdlib only)
  router-contention:
    name: "Gate 11: Router Contention"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run router contention
        run: python tests/test_router_contention.py

  # Gate 12: Hermes provider plugin (integrations/hermes)
  # Covers: ProviderProfile factory keys/values, aux-lane pin, base_url env
  hermes-provider:
    name: "Gate 12: Hermes Provider"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run hermes provider
        run: python tests/test_hermes_provider.py

  # Gate 13: Advisory /v1/route + Hermes pre_llm_call hook
  # Covers: side-effect-free routing introspection; hook fail-safe + **kwargs contract
  route-and-hook:
    name: "Gate 13: Route + Hook"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q fastapi httpx
      - name: Advisory /v1/route endpoint
        run: python tests/test_route_endpoint.py
      - name: pre_llm_call routing hook (mocked /route)
        run: python tests/test_pre_llm_call_hook.py

  # Gate 14: agentskills.io packaging (integrations/skills)
  # Covers: SKILL.md frontmatter, plugin.yaml kind, hardware_probe graceful (stdlib)
  skill-packaging:
    name: "Gate 14: Skill Packaging"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run skill packaging
        run: python tests/test_skill_packaging.py

  # Gate 15: canonical on-device demos (mac_demo/*, --mock, stdlib only)
  # Covers: the runnable Mac+Nemotron routing table — 6 turns, on-device + escalate
  # across complexity + contention, offline fail-closed — plus the plan-DAG and bench
  # demos in mock so none can rot. This is the headline demo.
  ondevice-demo:
    name: "Gate 15: On-Device Demo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Routing gate test (mock)
        run: python tests/test_mac_demo.py
      - name: Run the canonical demo (prints the routing table)
        run: python mac_demo/harp_demo.py --mock
      - name: Smoke the plan-DAG + bench demos (mock, stdlib only)
        run: |
          python mac_demo/plan_demo.py --mock
          python mac_demo/bench_demo.py --mock

  # Gate 16: secondary routing-demo artifact (demo/track_a_routing_demo)
  # Covers: the endpoint-backed /v1/route demo — 6-turn table + trace.jsonl split
  routing-demo-secondary:
    name: "Gate 16: Routing Demo (secondary)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q fastapi httpx
      - name: Run routing demo test
        run: python tests/test_track_a_demo.py
      - name: Run the demo end-to-end (prints the routing table)
        run: python demo/track_a_routing_demo.py

  # Full demo integration test (runs last, validates the whole spine)
  demo-integration:
    name: "Demo: Full Spine"
    runs-on: ubuntu-latest
    needs: [contract-smoke, conformance, sync-queue, e2e-smoke, ws-roundtrip, plan-codec, executor-smoke, genie-backend, remote-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -q jsonschema websockets httpx
      - name: Run demo (online, mocks)
        run: python -m demo.run_demo
      - name: Run demo (offline fail-closed)
        run: python -m demo.run_demo --offline
      - name: Run demo (distributed)
        run: python -m demo.run_demo --distributed
      - name: Run demo (genie forced)
        run: python -m demo.run_demo --genie

  # Summary gate — all must pass
  all-gates:
    name: "✅ All Gates Pass"
    runs-on: ubuntu-latest
    needs: [contract-smoke, conformance, sync-queue, e2e-smoke, ws-roundtrip, plan-codec, executor-smoke, genie-backend, remote-backend, serve-endpoint, router-contention, hermes-provider, route-and-hook, skill-packaging, ondevice-demo, routing-demo-secondary, demo-integration]
    if: always()
    steps:
      - name: Check all gates
        run: |
          if [[ "${{ needs.contract-smoke.result }}" != "success" ]] ||
             [[ "${{ needs.conformance.result }}" != "success" ]] ||
             [[ "${{ needs.sync-queue.result }}" != "success" ]] ||
             [[ "${{ needs.e2e-smoke.result }}" != "success" ]] ||
             [[ "${{ needs.ws-roundtrip.result }}" != "success" ]] ||
             [[ "${{ needs.plan-codec.result }}" != "success" ]] ||
             [[ "${{ needs.executor-smoke.result }}" != "success" ]] ||
             [[ "${{ needs.genie-backend.result }}" != "success" ]] ||
             [[ "${{ needs.remote-backend.result }}" != "success" ]] ||
             [[ "${{ needs.serve-endpoint.result }}" != "success" ]] ||
             [[ "${{ needs.router-contention.result }}" != "success" ]] ||
             [[ "${{ needs.hermes-provider.result }}" != "success" ]] ||
             [[ "${{ needs.route-and-hook.result }}" != "success" ]] ||
             [[ "${{ needs.skill-packaging.result }}" != "success" ]] ||
             [[ "${{ needs.ondevice-demo.result }}" != "success" ]] ||
             [[ "${{ needs.routing-demo-secondary.result }}" != "success" ]] ||
             [[ "${{ needs.demo-integration.result }}" != "success" ]]; then
            echo "::error::One or more gates failed"
            exit 1
          fi
          echo "All 16 gates + demo integration passed"